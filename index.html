<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play by Play</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="field"></canvas>
        <div id="scoreboard">
          <div class="sb-team sb-home">
            <span class="sb-name" id="sb-home-name"></span>
            <img class="sb-logo" id="sb-home-logo" alt="" />
            <span class="sb-score" id="sb-home-score">0</span>
          </div>
          <div class="sb-status">
            <span id="sb-clock">00:00</span>
            <span id="sb-status">KICK OFF</span>
          </div>
          <div class="sb-team sb-away">
            <span class="sb-score" id="sb-away-score">0</span>
            <img class="sb-logo" id="sb-away-logo" alt="" />
            <span class="sb-name" id="sb-away-name"></span>
          </div>
        </div>
        <div id="event-banners"></div>
      </div>
      <div id="hud">
        <div id="controls">
          <button id="play">Play</button>
          <input id="scrubber" type="range" min="0" max="4800" step="1" value="0" />
          <select id="speed">
            <option value="10">10×</option>
            <option value="30" selected>30×</option>
            <option value="60">60×</option>
            <option value="120">120×</option>
          </select>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
