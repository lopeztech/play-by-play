<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play by Play</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="selection-view"></div>
      <div id="replay-view" style="display:none">
        <div id="stage">
          <canvas id="field"></canvas>
          <div id="scoreboard">
            <div class="sb-team sb-home">
              <span class="sb-name" id="sb-home-name"></span>
              <span class="sb-possession" id="sb-home-poss" title="Possession"></span>
              <img class="sb-logo" id="sb-home-logo" alt="" />
              <span class="sb-score" id="sb-home-score">0</span>
            </div>
            <div class="sb-status">
              <span id="sb-clock">00:00</span>
              <span id="sb-status">KICK OFF</span>
            </div>
            <div class="sb-team sb-away">
              <span class="sb-score" id="sb-away-score">0</span>
              <img class="sb-logo" id="sb-away-logo" alt="" />
              <span class="sb-possession" id="sb-away-poss" title="Possession"></span>
              <span class="sb-name" id="sb-away-name"></span>
            </div>
          </div>
          <div id="slowmo-indicator">SLOW MO</div>
          <aside id="stats-panel">
            <div class="stats-title">MATCH STATS</div>
            <div class="stats-row stats-row--possession">
              <span class="stats-home" id="st-poss-h">50%</span>
              <span class="stats-label">
                <span class="stats-label-text">Possession</span>
                <span class="stats-bar">
                  <span class="stats-bar__home" id="st-poss-bar-h"></span>
                </span>
              </span>
              <span class="stats-away" id="st-poss-a">50%</span>
            </div>
            <div class="stats-row"><span class="stats-home" id="st-tries-h">0</span><span class="stats-label">Tries</span><span class="stats-away" id="st-tries-a">0</span></div>
            <div class="stats-row"><span class="stats-home" id="st-goals-h">0</span><span class="stats-label">Goals</span><span class="stats-away" id="st-goals-a">0</span></div>
            <div class="stats-row"><span class="stats-home" id="st-breaks-h">0</span><span class="stats-label">Line Breaks</span><span class="stats-away" id="st-breaks-a">0</span></div>
            <div class="stats-row"><span class="stats-home" id="st-kicks-h">0</span><span class="stats-label">Kicks</span><span class="stats-away" id="st-kicks-a">0</span></div>
            <div class="stats-row"><span class="stats-home" id="st-pens-h">0</span><span class="stats-label">Penalties</span><span class="stats-away" id="st-pens-a">0</span></div>
            <div class="stats-row"><span class="stats-home" id="st-errors-h">0</span><span class="stats-label">Errors</span><span class="stats-away" id="st-errors-a">0</span></div>
            <div class="stats-row"><span class="stats-home" id="st-sets-h">0</span><span class="stats-label">Set Restarts</span><span class="stats-away" id="st-sets-a">0</span></div>
          </aside>
        </div>
        <div id="event-strip">
          <div id="event-banner-main"></div>
        </div>
        <div id="hud">
          <div id="controls">
            <button id="back-btn" title="Back to round selection">←</button>
            <button id="play">Play</button>
            <input id="scrubber" type="range" min="0" max="4800" step="1" value="0" />
            <select id="speed">
              <option value="10">10×</option>
              <option value="30" selected>30×</option>
              <option value="60">60×</option>
              <option value="120">120×</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
